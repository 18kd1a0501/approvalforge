name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install aiosqlite pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          SECRET_KEY: ci-secret-key-for-testing-only
          DEBUG: "false"
        run: pytest tests/ -v